name: Build and Release Clashgram Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies 📦
        run: npm install

      - name: Setup Java JDK 17 ☕
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Web Production App 🏗️
        env:
          CLASHGRAM_API_ID: ${{ secrets.CLASHGRAM_API_ID || '2496' }}
          CLASHGRAM_API_HASH: ${{ secrets.CLASHGRAM_API_HASH || '8da85b0d5bfe62527e5b244c209159c3' }}
          APP_ENV: production
        run: |
          npm run build:production
          # Manually run the copy_to_dist logic since bash script might require executable permissions
          cp -R ./public/* dist/ || true
          cp ./src/lib/rlottie/rlottie-wasm.wasm dist/ || true
          cp ./node_modules/opus-recorder/dist/decoderWorker.min.wasm dist/ || true
          cp -R ./node_modules/emoji-data-ios/img-apple-64 dist/ || true
          cp -R ./node_modules/emoji-data-ios/img-apple-160 dist/ || true

      - name: Sync Web Bundle to Android Shell 📲
        run: npx cap sync android

      - name: Build Android Debug APK 🤖
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact 📤
        uses: actions/upload-artifact@v4
        with:
          name: clashgram-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release and Upload Asset 🚀
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: Clashgram Release ${{ github.ref_name }}
          body: |
            ### Clashgram Android Release
            
            This release contains the latest fully notch-proof, responsive Android Debug binary built automatically via GitHub Actions.
            
            - **Filename**: `app-debug.apk`
            - **Target Compatibility**: Android SDK 24+ (Android 7.0+)
            - **JDK target**: OpenJDK 17
            
            Enjoy the seamless Clashgram mobile experience!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
